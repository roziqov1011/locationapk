name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Java muhitini sozlash (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Yo'qolgan Gradle Wrapper fayllarini qayta yaratish
      run: gradle wrapper

    - name: Gradle-ga ruxsat berish
      run: chmod +x gradlew

    - name: Gradle aynan so'rayotgan manzilga debug.keystore yaratish
      run: |
        mkdir -p /home/runner/.gradle/daemon/9.5.1/~/.android/
        keytool -genkey -v -keystore /home/runner/.gradle/daemon/9.5.1/~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp /home/runner/.gradle/daemon/9.5.1/~/.android/debug.keystore ./debug.keystore

    - name: APK faylni yig'ish (Keshni tozalash bilan)
      run: ./gradlew clean assembleDebug --no-daemon --no-build-cache

    - name: Tayyor APK-ni yuklab olish uchun saqlash
      uses: actions/upload-artifact@v4
      with:
        name: Ilova-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
