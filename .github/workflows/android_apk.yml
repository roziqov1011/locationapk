name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ] # Kod qaysi branchga yuklansa ishga tushishi (tekshirib ko'ring)
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Java muhitini sozlash (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle-ga ruxsat berish
      run: chmod +x gradlew

    - name: APK faylni yig'ish (Build)
      run: ./gradlew assembleDebug

    - name: Tayyor APK-ni saqlash
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
