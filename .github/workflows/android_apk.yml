name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Java muhitini sozlash (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Yo'qolgan Gradle Wrapper fayllarini qayta yaratish
      run: gradle wrapper

    - name: Gradle-ga ruxsat berish
      run: chmod +x gradlew

    - name: APK faylni yig'ish (Build)
      run: ./gradlew assembleDebug --no-daemon

    - name: Tayyor APK-ni yuklab olish uchun saqlash
      uses: actions/upload-artifact@v4
      with:
        name: Ilova-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
