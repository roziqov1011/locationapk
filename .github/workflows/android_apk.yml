name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Java muhitini sozlash (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Yo'qolgan Gradle Wrapper fayllarini qayta yaratish
      run: gradle wrapper

    - name: Gradle-ga ruxsat berish
      run: chmod +x gradlew

    - name: Gradle aynan so'rayotgan manzilga debug.keystore yaratish
      run: |
        # 1. Avval tizimda standart debug kalit yaratamiz
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        
        # 2. Gradle xatolikda so'ragan o'sha g'alati ichki papkani majburlab ochamiz
        mkdir -p /home/runner/.gradle/daemon/9.5.1/~/.android/
        
        # 3. Kalitni aynan o'sha u qidirgan manzilga nusxalaymiz
        cp ~/.android/debug.keystore /home/runner/.gradle/daemon/9.5.1/~/.android/debug.keystore
        
        # 4. Loyihaning asosiy ildiz (root) papkasiga ham nusxalab qo'yamiz (har ehtimolga qarshi)
        cp ~/.android/debug.keystore ./debug.keystore
        cp ~/.android/debug.keystore ./locationapk/debug.keystore || true

    - name: APK faylni yig'ish (Build)
      run: ./gradlew assembleDebug --no-daemon
