name: Android APK Generator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Java muhitini sozlash (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradlew faylini qidirish va ruxsat berish
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "XATOLIK: Loyihada gradlew fayli umuman topilmadi! Bu haqiqiy Android loyihasi ekanligiga ishonchingiz komilmi?"
          exit 1
        fi
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        echo "Loyiha papkasi topildi: $GRADLE_DIR"
        chmod +x "$GRADLEW_PATH"
        echo "PROJECT_DIR=$GRADLE_DIR" >> $GITHUB_ENV

    - name: APK faylni yig'ish (Build)
      run: |
        cd ${{ env.PROJECT_DIR }}
        ./gradlew assembleDebug --no-daemon
